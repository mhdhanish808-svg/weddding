<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thaha weds Shahanas | Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="invitation-container">
        <div class="overlay"></div>
        <div class="content-wrapper">
            <div class="top-ornament">✨</div>
            <p class="pre-heading fade-in">You are warmly invited to the wedding celebration of</p>
            <h1 class="couple-names pop-in">Thaha <span class="weds">weds</span> Shahanas</h1>
            
            <div class="divider"></div>
            
            <div class="details-section slide-up">
                <div class="detail-item">
                    <span class="icon">📅</span>
                    <h3>Date</h3>
                    <p>02/07/2026</p>
                </div>
                
                <div class="detail-item center-item">
                    <span class="icon">🕌</span>
                    <h3>Nikah Time</h3>
                    <p>4:00 PM - 10:00 PM</p>
                </div>

                <div class="detail-item">
                    <span class="icon">📍</span>
                    <h3>Venue</h3>
                    <p>Kannur Hall</p>
                </div>
            </div>
            
            <div class="divider"></div>

            <p class="closing fade-in-late">All are invited to join us and bless the occasion.</p>
            <div class="bottom-ornament fade-in-late">✨</div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.fade-in, .pop-in, .slide-up, .divider, .fade-in-late');
            elements.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('visible');
                }, 300 * (index + 1));
            });
        });
    </script>
</body>
</html>
